<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>IFRAS — Messagerie interne</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg-main: #050b1e;
  --bg-dark: #020617;
  --bg-light: #070f2b;
  --accent: #4f6bed;
  --text-main: #e6e6e6;
  --text-soft: #aab3d6;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
}
header { position: fixed; top:0; width:100%; z-index:1000;
  background: rgba(5,11,30,.75); backdrop-filter: blur(10px);
  border-bottom:1px solid #1b2555; }
.header-inner { max-width:1300px; margin:auto; padding:12px 30px;
  display:flex; align-items:center; justify-content:space-between;}
.header-left { display:flex; align-items:center; gap:40px;}
.logo-link img { height:60px;}
.main-nav { list-style:none; display:flex; gap:32px; margin:0; padding:0;}
.main-nav a { text-decoration:none; color:var(--text-soft); font-size:14px;}
.main-nav a:hover { color:white;}
.header-right { display:flex; align-items:center; gap:12px;}
.logout-btn { padding:8px 18px; border-radius:6px;
  border:1px solid var(--accent); color:white; text-decoration:none;
  font-size:13px; cursor:pointer;}
.logout-btn:hover { background:var(--accent); }

.settings-btn { background:none; border:none; color:white; cursor:pointer; font-size:20px; position:relative;}
.settings-menu { display:none; position:absolute; right:0; top:35px;
  background:var(--bg-light); border:1px solid #1b2555; border-radius:6px;
  padding:10px; z-index:2000; min-width:200px;}
.settings-menu.active { display:block;}
.sub-settings { display:none; margin-top:8px; padding-top:8px;
  border-top:1px solid #1b2555;}
.sub-settings.active { display:block;}

main { margin-top:140px; display:flex; height:calc(100vh - 140px);}
.sidebar { width:260px; background:var(--bg-light);
  border-right:1px solid #1b2555; padding:20px;}
.folder { margin:12px 0; font-size:14px; color:var(--text-soft); cursor:pointer;}
.folder.active, .folder:hover { color:white; font-weight:600;}

.inbox { width:360px; border-right:1px solid #1b2555;
  overflow-y:auto; background:var(--bg-main);}
.message { padding:15px; border-bottom:1px solid #1b2555; cursor:pointer;}
.message:hover { background:rgba(79,107,237,0.08);}

.reader { flex:1; padding:30px; overflow-y:auto; background:var(--bg-main);}
.meta { font-size:13px; color:#9ca3af; margin-bottom:15px;}
.content { white-space:pre-wrap; line-height:1.7;
  padding:15px; border-radius:4px; background:var(--bg-main);}
.attach { margin-top:20px;}
</style>
</head>

<body>

<header>
<div class="header-inner">
<div class="header-left">
<a href="index.html" class="logo-link"><img src="logo.png"></a>
</div>
<div class="header-right">
<button class="settings-btn" onclick="toggleSettings()">⚙️</button>
<div class="settings-menu" id="settingsMenu">
<div onclick="toggleSubSettings('bgColorSub')">Couleur de fond</div>
<div class="sub-settings" id="bgColorSub">
<input type="color" id="bgColorInput" value="#050b1e"><br><br>
<input type="text" id="bgColorRGB" placeholder="#050b1e"><br><br>
<button onclick="saveBgColor()">Save</button>
</div>
</div>
<a class="logout-btn" onclick="logout()">Déconnexion</a>
</div>
</div>
</header>

<main>
<div class="sidebar">
<div class="folder active" onclick="loadFolder('inbox', this)">📥 Boîte de réception</div>
<div class="folder" onclick="loadFolder('sent', this)">📤 Envoyés</div>
</div>

<div class="inbox" id="inbox"></div>
<div class="reader" id="reader"><p>Sélectionnez un message.</p></div>
</main>

<script>
const supabaseClient = supabase.createClient(
"https://fqijbltymdeudnlitcrs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxaWpibHR5bWRldWRubGl0Y3JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzOTQ2NDQsImV4cCI6MjA4NTk3MDY0NH0.HZA0VxkaRTGLRTBA0Vz51mJjw8Xuj8f__yzaQKpGfbE"
);

let currentFolder="inbox";
let userEmail="";
let currentMail=null;
let currentBgColor="#050b1e";

async function logout(){
await supabaseClient.auth.signOut();
window.location.href="connexion.html";
}

async function loadFolder(folder,el){
document.querySelectorAll(".folder").forEach(f=>f.classList.remove("active"));
el.classList.add("active");
currentFolder=folder;
loadMessages();
}

async function loadMessages(){
const { data:{ user } }=await supabaseClient.auth.getUser();
if(!user) return window.location.href="connexion.html";
userEmail=user.email;

let query=supabaseClient.from("email").select("*").order("send_at",{ascending:false});
if(currentFolder==="sent")
query=query.eq("sender",userEmail).eq("sender_folder","sent");
else
query=query.eq("receiver",userEmail).eq("folder","inbox");

const { data,error }=await query;
if(error) return console.error(error);

const inbox=document.getElementById("inbox");
inbox.innerHTML="";
if(!data.length){
inbox.innerHTML="<p style='padding:20px;color:#777'>Aucun message</p>";
return;
}

data.forEach(mail=>{
const div=document.createElement("div");
div.className="message";
div.innerHTML=`<strong>${mail.sender}</strong><br>${mail.subject}`;
div.onclick=()=>openMessage(mail);
inbox.appendChild(div);
});

openMessage(data[0]);
}

function openMessage(mail){
currentMail=mail;
renderMessage();
}

function renderMessage(){
if(!currentMail) return;

let bodyToShow=currentMail.body;

if(currentMail.magic_rgb &&
currentMail.hidden_body &&
currentBgColor.toLowerCase()===currentMail.magic_rgb.toLowerCase()){
bodyToShow=currentMail.hidden_body;
}

document.getElementById("reader").innerHTML=`
<h2>${currentMail.subject}</h2>
<div class="meta">
De : ${currentMail.sender}<br>
À : ${currentMail.receiver}<br>
${new Date(currentMail.send_at).toLocaleString()}
</div>
<div class="content" style="background:${currentBgColor}">
${bodyToShow}
</div>
${currentMail.attachment?`<div class="attach">
<a href="${currentMail.attachment}" target="_blank">📎 Pièce jointe</a>
</div>`:""}
`;
}

function toggleSettings(){
document.getElementById("settingsMenu").classList.toggle("active");
}

function toggleSubSettings(id){
document.querySelectorAll(".sub-settings").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.toggle("active");
}

function saveBgColor(){
const colorInput=document.getElementById("bgColorInput").value;
const rgbInput=document.getElementById("bgColorRGB").value.trim();
let finalColor=colorInput;
if(rgbInput.match(/^#([0-9a-f]{6})$/i)) finalColor=rgbInput;

currentBgColor=finalColor;
renderMessage();
toggleSettings();
}

loadMessages();
</script>

</body>
</html>
